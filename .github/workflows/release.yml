name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 重要（macOS 未公证版本）
            1) 请不要在 DMG 窗口里直接双击 App。
            2) 正确步骤：先拖到 Applications，再从“应用程序”中打开。
            3) 若提示“已损坏，无法打开”，请先下载 `*-macos-unsigned-quickstart.zip` 并双击其中 `macos-quick-fix.command`。

            手动修复命令（已拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles app,dmg

      - name: Build macOS unsigned quickstart zip
        id: quickstart
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Cannot find built macOS .app bundle"
            exit 1
          fi

          PACKAGE_DIR="src-tauri/target/release/bundle/quickstart"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cp -R "$APP_PATH" "$PACKAGE_DIR/"
          cp scripts/macos-quick-fix.command "$PACKAGE_DIR/"
          cp docs/UNSIGNED_QUICKSTART.zh-CN.md "$PACKAGE_DIR/README-先看.md"
          cp docs/UNSIGNED_QUICKSTART.md "$PACKAGE_DIR/README-FIRST.md"

          ZIP_NAME="upload-test-file-generator-${GITHUB_REF_NAME}-macos-unsigned-quickstart.zip"
          (
            cd "$PACKAGE_DIR"
            zip -qry "$ZIP_NAME" .
          )
          echo "zip_path=${PACKAGE_DIR}/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS unsigned quickstart zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.quickstart.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 重要（macOS 未公证版本）
            1) 请不要在 DMG 窗口里直接双击 App。
            2) 正确步骤：先拖到 Applications，再从“应用程序”中打开。
            3) 若提示“已损坏，无法打开”，请先下载 `*-macos-unsigned-quickstart.zip` 并双击其中 `macos-quick-fix.command`。

            手动修复命令（已拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

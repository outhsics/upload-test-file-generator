name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 重要（macOS 未公证版本）
            1) 请不要在 DMG 窗口里直接双击 App。
            2) 正确步骤：先拖到 Applications，再从“应用程序”中打开。
            3) 若被拦截：先在“应用程序”里尝试打开一次，然后到“系统设置 -> 隐私与安全性”点击“仍要打开”。
            4) 若仍提示“已损坏，无法打开”，再按 quickstart 包中的终端命令执行。

            手动修复命令（已拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles app,dmg

      - name: Build macOS unsigned quickstart zip
        id: quickstart
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$(find "${BUNDLE_BASE}/macos" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Cannot find built macOS .app bundle"
            exit 1
          fi

          PACKAGE_DIR="${BUNDLE_BASE}/quickstart-${{ matrix.arch }}"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cp -R "$APP_PATH" "$PACKAGE_DIR/"
          cp docs/UNSIGNED_QUICKSTART.zh-CN.md "$PACKAGE_DIR/README-先看.md"
          cp docs/UNSIGNED_QUICKSTART.md "$PACKAGE_DIR/README-FIRST.md"
          cp docs/TERMINAL_FIX.txt "$PACKAGE_DIR/TERMINAL_FIX.txt"

          ZIP_NAME="upload-test-file-generator-${GITHUB_REF_NAME}-macos-open-guide-${{ matrix.arch }}.zip"
          (
            cd "$PACKAGE_DIR"
            zip -qry "$ZIP_NAME" .
          )
          echo "zip_path=${PACKAGE_DIR}/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS DMG aliases for Homebrew
        id: dmg_alias
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG_PATH="$(find "${BUNDLE_BASE}/dmg" -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "Cannot find built macOS .dmg bundle"
            exit 1
          fi

          ALIAS_DIR="${BUNDLE_BASE}/alias"
          mkdir -p "$ALIAS_DIR"

          STATIC_NAME="upload-test-file-generator-macos-${{ matrix.arch }}.dmg"
          VERSIONED_NAME="upload-test-file-generator-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}.dmg"

          cp "$DMG_PATH" "${ALIAS_DIR}/${STATIC_NAME}"
          cp "$DMG_PATH" "${ALIAS_DIR}/${VERSIONED_NAME}"

          echo "dmg_static_path=${ALIAS_DIR}/${STATIC_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_versioned_path=${ALIAS_DIR}/${VERSIONED_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS extra assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.quickstart.outputs.zip_path }}
            ${{ steps.dmg_alias.outputs.dmg_static_path }}
            ${{ steps.dmg_alias.outputs.dmg_versioned_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 重要（macOS 未公证版本）
            1) 请不要在 DMG 窗口里直接双击 App。
            2) 正确步骤：先拖到 Applications，再从“应用程序”中打开。
            3) 若被拦截：先在“应用程序”里尝试打开一次，然后到“系统设置 -> 隐私与安全性”点击“仍要打开”。
            4) 若仍提示“已损坏，无法打开”，再按 quickstart 包中的终端命令执行。

            手动修复命令（已拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

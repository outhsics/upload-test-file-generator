name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 注意（未公证版本常见提示）
            部分 macOS 设备首次打开可能提示“已损坏，无法打开”。这通常是 Gatekeeper 对未公证应用的拦截。

            修复命令（将 App 拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles app,dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Upload Release Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 上传测试文件生成器 ${{ github.ref_name }}
          releaseBody: |
            ⚠️ 注意（未公证版本常见提示）
            部分 macOS 设备首次打开可能提示“已损坏，无法打开”。这通常是 Gatekeeper 对未公证应用的拦截。

            修复命令（将 App 拖到 Applications 后执行）：
            `xattr -dr com.apple.quarantine "/Applications/上传测试文件生成器.app"`

            详细说明：
            - 中文: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.zh-CN.md
            - EN: https://github.com/outhsics/upload-test-file-generator/blob/main/docs/USER_GUIDE.md

            See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
